<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky</title>
    <!--css -->
      <link href="./output.css" rel="stylesheet">
        <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
       <style>
         * { font-family: 'Tajawal', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0b1a2e 50%, #0f212f 100%);
            min-height: 100vh;
            position: relative;
        }
        
        /* خلفية النجوم */
        .stars, .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .stars {
            background: #000 url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48Y2lyY2xlIGN4PSI2IiBjeT0iMTQiIHI9IjEiIGZpbGw9IndoaXRlIiAvPjxjaXJjbGUgY3g9IjE2MCIgY3k9IjYwIiByPSIxLjUiIGZpbGw9IndoaXRlIiAvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMjAwIiByPSIxLjIiIGZpbGw9IndoaXRlIiAvPjxjaXJjbGUgY3g9IjI4MCIgY3k9IjE4MCIgcj0iMSIgZmlsbD0id2hpdGUiIC8+PGNpcmNsZSBjeD0iNTAiIGN5PSI1MCIgcj0iMSIgZmlsbD0id2hpdGUiIC8+PC9zdmc+') repeat;
            background-size: 300px 300px;
            opacity: 0.8;
        }
        
        .twinkling {
            background: transparent url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48Y2lyY2xlIGN4PSI4MCIgY3k9IjQwIiByPSIyIiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjgiIC8+PGNpcmNsZSBjeD0iMTUwIiBjeT0iMTUwIiByPSIxLjUiIGZpbGw9IiNmZmZmZmYiIG9wYWNpdHk9IjAuNiIgLz48L3N2Zz4=') repeat;
            background-size: 300px 300px;
            animation: twinkle 4s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .content { position: relative; z-index: 10; }
        
        /* التصميم الزجاجي */
        .glass-nav {
            background: rgba(5, 10, 20, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .glass-card {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(255, 215, 0, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 215, 0, 0.2);
        }
        
        /* محرك البحث */
        .search-container {
            background: rgba(5, 10, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 50px;
            transition: all 0.3s;
        }
        
        .search-container:focus-within {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        .search-input {
            background: transparent;
            border: none;
            color: white;
            padding: 12px 20px;
            width: 100%;
        }
        
        .search-input:focus { outline: none; }
        
        .search-results {
            background: rgba(5, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .search-result-item {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .search-result-item:hover {
            background: rgba(255, 215, 0, 0.1);
            padding-right: 30px;
        }
        
        /* القائمة الجانبية للموبايل */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100vh;
            background: rgba(5, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            z-index: 50;
            transition: right 0.3s ease;
            padding: 20px;
            border-left: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .mobile-menu.open { right: 0; }
        
        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 40;
            display: none;
        }
        
        .mobile-menu-overlay.open { display: block; }
        
        /* النجوم البراقة */
        .star-glow {
            filter: drop-shadow(0 0 8px #ffd700);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        
        /* أزرار التصنيفات */
        .category-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        .category-btn:hover, .category-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>
      <!-- خلفية النجوم -->
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <!-- طبقة التعتيم للقائمة الجانبية -->
    <div class="mobile-menu-overlay" id="menuOverlay"></div>
    
    <!-- القائمة الجانبية للموبايل -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-yellow-400">القائمة</h2>
            <button onclick="toggleMobileMenu()" class="text-white text-2xl">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="flex flex-col gap-4">
            <a href="index.html" class="text-white text-lg py-2 px-4 rounded-lg hover:bg-yellow-500/20 transition flex items-center gap-3">
                <i class="fas fa-home text-yellow-400 w-6"></i> الرئيسية
            </a>
            <a href="constellations.html" class="text-white text-lg py-2 px-4 rounded-lg hover:bg-yellow-500/20 transition flex items-center gap-3 bg-yellow-500/20">
                <i class="fas fa-star text-yellow-400 w-6"></i> الكوكبات
            </a>
            <a href="stars.html" class="text-white text-lg py-2 px-4 rounded-lg hover:bg-yellow-500/20 transition flex items-center gap-3">
                <i class="fas fa-sun text-yellow-400 w-6"></i> النجوم
            </a>
            <a href="nebulae.html" class="text-white text-lg py-2 px-4 rounded-lg hover:bg-yellow-500/20 transition flex items-center gap-3">
                <i class="fas fa-cloud text-yellow-400 w-6"></i> السدم
            </a>
            <a href="galaxies.html" class="text-white text-lg py-2 px-4 rounded-lg hover:bg-yellow-500/20 transition flex items-center gap-3">
                <i class="fas fa-galaxy text-yellow-400 w-6"></i> المجرات
            </a>
            <div class="border-t border-yellow-500/20 my-4"></div>
            <a href="blackholes.html" class="text-white text-lg py-2 px-4 rounded-lg hover:bg-yellow-500/20 transition flex items-center gap-3">
                <i class="fas fa-circle text-yellow-400 w-6"></i> الثقوب السوداء
            </a>
            <a href="solar-system.html" class="text-white text-lg py-2 px-4 rounded-lg hover:bg-yellow-500/20 transition flex items-center gap-3">
                <i class="fas fa-planet-ringed text-yellow-400 w-6"></i> المجموعة الشمسية
            </a>
        </nav>
    </div>
    
    <!-- المحتوى الرئيسي -->
    <div class="content relative">
        <!-- الناف بار التفاعلي -->
        <nav class="glass-nav sticky top-0 z-30 border-b border-yellow-500/20">
            <div class="container mx-auto px-4">
                <div class="flex justify-between items-center h-16">
                    <!-- الشعار -->
                    <div class="flex items-center gap-3">
                        <i class="fas fa-meteor text-yellow-400 text-2xl star-glow"></i>
                        <a href="index.html" class="text-xl font-bold text-white">
                            <span class="text-yellow-400">الفلك</span> بيديا
                        </a>
                    </div>
                    
                    <!-- القائمة الرئيسية للديسكتوب -->
                    <div class="hidden md:flex items-center gap-1">
                        <a href="index.html" class="text-gray-300 hover:text-yellow-400 px-3 py-2 rounded-lg transition flex items-center gap-2">
                            <i class="fas fa-home"></i>
                            <span>الرئيسية</span>
                        </a>
                        <a href="constellations.html" class="text-yellow-400 bg-yellow-500/20 px-3 py-2 rounded-lg transition flex items-center gap-2">
                            <i class="fas fa-star"></i>
                            <span>الكوكبات</span>
                        </a>
                        <a href="stars.html" class="text-gray-300 hover:text-yellow-400 px-3 py-2 rounded-lg transition flex items-center gap-2">
                            <i class="fas fa-sun"></i>
                            <span>النجوم</span>
                        </a>
                        <a href="nebulae.html" class="text-gray-300 hover:text-yellow-400 px-3 py-2 rounded-lg transition flex items-center gap-2">
                            <i class="fas fa-cloud"></i>
                            <span>السدم</span>
                        </a>
                        <a href="galaxies.html" class="text-gray-300 hover:text-yellow-400 px-3 py-2 rounded-lg transition flex items-center gap-2">
                            <i class="fas fa-galaxy"></i>
                            <span>المجرات</span>
                        </a>
                    </div>
                    
                    <!-- أيقونات يمنى -->
                    <div class="flex items-center gap-3">
                        <!-- زر البحث للديسكتوب -->
                        <button onclick="toggleSearch()" class="hidden md:block text-white hover:text-yellow-400 text-xl">
                            <i class="fas fa-search"></i>
                        </button>
                        
                        <!-- زر القائمة للموبايل -->
                        <button onclick="toggleMobileMenu()" class="md:hidden text-white text-2xl">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- شريط البحث المنبثق (للديسكتوب) -->
            <div id="searchBar" class="hidden border-t border-yellow-500/20 py-4">
                <div class="container mx-auto px-4">
                    <div class="flex gap-3">
                        <div class="flex-1 search-container flex items-center px-4">
                            <i class="fas fa-search text-yellow-500 ml-3"></i>
                            <input type="text" id="globalSearch" placeholder="ابحث عن كوكبة، نجم، سديم، مجرة..." class="search-input">
                        </div>
                        <button onclick="toggleSearch()" class="px-4 text-gray-400 hover:text-white">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div id="globalSearchResults" class="search-results mt-2 hidden"></div>
                </div>
            </div>
        </nav>
        
        <!-- محتوى الصفحة -->
        <main class="container mx-auto px-4 py-8">
            <!-- رأس الصفحة -->
            <div class="text-center mb-12">
                <h1 class="text-5xl md:text-6xl font-black mb-4 text-yellow-400" style="text-shadow: 0 0 20px rgba(255,215,0,0.5);">
                    <i class="fas fa-star ml-2 star-glow"></i>
                    الكوكبات الفلكية
                </h1>
                <p class="text-xl text-gray-300 max-w-3xl mx-auto">
                    استكشف 88 كوكبة رسمية في السماء الليلية، تعرف على أشهر النجوم والأساطير المرتبطة بها
                </p>
            </div>
            
            <!-- أزرار التصفية -->
            <div class="flex flex-wrap justify-center gap-3 mb-10">
                <button class="category-btn active" onclick="filterConstellations('all')">الكل</button>
                <button class="category-btn" onclick="filterConstellations('northern')">الشمالية</button>
                <button class="category-btn" onclick="filterConstellations('southern')">الجنوبية</button>
                <button class="category-btn" onclick="filterConstellations('zodiac')">الأبراج</button>
                <button class="category-btn" onclick="filterConstellations('famous')">المشهورة</button>
            </div>
            
            <!-- بطاقات الكوكبات -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="constellationsGrid">
                <!-- سيتم تعبئتها بالجافاسكريبت -->
            </div>
        </main>
    </div>
    
    <!-- script -->
     <script src="index.js"></script>
